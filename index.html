<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-1">
    <div class="container">
        <div class="form-card">
            <h1>Personal Information</h1>
            <p class="subtitle">Please fill in your details below</p>

            <form id="userForm">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <div class="phone-input-wrapper">
                        <div class="country-selector-container">
                            <div class="country-selector" id="countrySelector">
                                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23006a4e' d='M0 0h640v480H0z'/%3E%3Ccircle cx='280' cy='240' r='160' fill='%23f42a41'/%3E%3C/svg%3E" alt="Bangladesh" class="country-flag" id="selectedFlag">
                                <span class="country-code" id="selectedCode">+880</span>
                                <span class="dropdown-arrow">▼</span>
                            </div>

                            <!-- Country Dropdown Modal -->
                            <div class="country-dropdown" id="countryDropdown" style="display: none;">
                                <div class="country-search">
                                    <input type="text" id="countrySearch" placeholder="Search country...">
                                </div>
                                <div class="country-list" id="countryList">
                                    <!-- Countries will be populated by JavaScript -->
                                </div>
                            </div>
                        </div>
                        <input type="tel" id="phone" name="phone" required placeholder="1234567890" class="phone-number-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age *</label>
                        <input type="number" id="age" name="age" required min="1" max="120" placeholder="25">
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="lifeThoughts">What do you feel about your life? *</label>
                    <textarea id="lifeThoughts" name="lifeThoughts" required rows="6" placeholder="Share your thoughts and feelings..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Submit</span>
                    <span class="btn-loader" style="display: none;">Sending OTP...</span>
                </button>
            </form>

            <div class="alert alert-error" id="errorAlert" style="display: none;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
