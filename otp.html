<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-2">
    <div class="container">
        <div class="form-card otp-card">
            <div class="otp-icon">📧</div>
            <h1>Please enter the OTP</h1>
            <p class="subtitle">Check your email for the OTP</p>
            <p class="email-sent" id="emailSent"></p>

            <form id="otpForm">
                <div class="form-group">
                    <input type="text" id="otpInput" name="otp" required
                           placeholder="Enter 6-digit OTP"
                           maxlength="6"
                           pattern="[0-9]{6}"
                           class="otp-input">
                </div>

                <button type="submit" class="submit-btn" id="verifyBtn">
                    <span class="btn-text">Submit</span>
                    <span class="btn-loader" style="display: none;">Verifying...</span>
                </button>
            </form>

            <div class="resend-section">
                <p>Didn't receive the OTP?</p>
                <button class="resend-btn" id="resendBtn">Resend OTP</button>
            </div>
        </div>
    </div>

    <!-- OTP Modal Popup -->
    <div id="otpModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-icon">❌</div>
            <h2>Wrong OTP</h2>
            <p>Please enter the correct OTP</p>
            <button class="modal-btn" onclick="closeModal()">Try Again</button>
        </div>
    </div>

    <script src="otp.js"></script>
</body>
</html>
